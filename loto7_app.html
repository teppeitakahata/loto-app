<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロト7 当選番号分析アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: #0a0f2e; background: linear-gradient(135deg, #0a0f2e, #1a1f4e, #0d2137); min-height: 100vh; color: #e0e0e0; }

  header { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 20px 30px; text-align: center; }
  header h1 { font-size: 2rem; background: linear-gradient(90deg, #00c6ff, #0072ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
  header p { color: #aaa; margin-top: 5px; font-size: 0.9rem; }

  .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
  .stat-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; text-align: center; transition: transform 0.2s; }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-card .label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #00c6ff; }
  .stat-card .sub { font-size: 0.75rem; color: #888; margin-top: 4px; }

  .section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin-bottom: 30px; }
  .section-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
  .section-title .icon { font-size: 1.4rem; }

  /* 予測番号 */
  .prediction-area { text-align: center; }
  .prediction-desc { color: #aaa; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
  .prediction-controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: bold; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff; }
  .btn-primary:hover { opacity: 0.9; transform: scale(1.03); }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.2); }
  .btn-secondary:hover { background: rgba(255,255,255,0.15); }

  .method-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  .method-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #ccc; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .method-btn.active { background: linear-gradient(135deg, #0072ff, #a855f7); border-color: transparent; color: white; }

  .prediction-sets { display: flex; flex-direction: column; gap: 16px; }
  .prediction-set { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; }
  .prediction-set-label { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; }
  .ball-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }

  .ball { width: 52px; height: 52px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.5); box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2); }

  /* Hot/Cold */
  .hotcold-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .hotcold-list { list-style: none; }
  .hotcold-list li { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .rank { font-size: 0.75rem; color: #666; width: 24px; text-align: center; }
  .freq-bar-wrap { flex: 1; background: rgba(255,255,255,0.05); border-radius: 4px; height: 6px; overflow: hidden; }
  .freq-bar { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .hot .freq-bar { background: linear-gradient(90deg, #00c6ff, #0072ff); }
  .cold .freq-bar { background: linear-gradient(90deg, #a855f7, #ec4899); }
  .freq-count { font-size: 0.8rem; color: #aaa; width: 40px; text-align: right; }

  /* テーブル */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead tr { background: rgba(255,255,255,0.08); }
  th { padding: 12px 10px; text-align: center; color: #aaa; font-weight: normal; font-size: 0.8rem; letter-spacing: 1px; }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; }
  tbody tr:hover { background: rgba(255,255,255,0.05); }
  td { padding: 10px; text-align: center; }
  td.date-col { color: #aaa; font-size: 0.85rem; }
  td.kai-col { color: #666; font-size: 0.85rem; }
  .num-badge { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; font-weight: bold; font-size: 0.85rem; margin: 0 2px; }
  .bonus-badge { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px dashed #a855f7; }

  /* チャート */
  .chart-container { position: relative; height: 300px; }
  .chart-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .chart-tab { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: #aaa; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .chart-tab.active { background: rgba(0,114,255,0.3); border-color: #0072ff; color: #fff; }

  /* フィルター */
  .filter-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-row label { color: #aaa; font-size: 0.85rem; }
  select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e0e0e0; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; }

  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 16px; }
  .pagination button { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: #aaa; cursor: pointer; }
  .pagination button:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info { color: #aaa; font-size: 0.85rem; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
  .tag-hot { background: rgba(0,198,255,0.2); color: #00c6ff; border: 1px solid rgba(0,198,255,0.3); }
  .tag-cold { background: rgba(168,85,247,0.2); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }

  .bonus-divider { width: 1px; height: 40px; background: rgba(168,85,247,0.4); margin: 0 4px; }
  .bonus-label { font-size: 0.7rem; color: #a855f7; text-align: center; margin-top: 4px; }

  .footer { text-align: center; color: #555; font-size: 0.8rem; padding: 30px; }

  @media (max-width: 600px) {
    .hotcold-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.4rem; }
    .ball { width: 42px; height: 42px; font-size: 0.95rem; }
  }
  .mode-toggle { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
  .mode-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #ccc; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: all 0.2s; }
  .mode-btn.active.normal { background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; border-color: transparent; }
  .mode-btn.active.rare { background: linear-gradient(135deg, #ee0979, #ff6a00); color: white; border-color: transparent; }
  .rare-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; background: rgba(238,9,121,0.15); color: #ff8c42; border: 1px solid rgba(238,9,121,0.3); font-size: 0.7rem; font-weight: bold; margin-left: 4px; }
  .refresh-btn {
    display: block;
    margin: 10px auto 0;
    padding: 10px 28px;
    background: linear-gradient(135deg, #00b09b, #2196f3);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,176,155,0.4);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .refresh-btn:hover { opacity: 0.88; transform: scale(1.04); }
  .refresh-btn:active { transform: scale(0.97); }

  /* プルダウンリフレッシュ */
  #ptr-indicator {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 0;
    background: linear-gradient(135deg, #00b09b, #2196f3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 0.9rem;
    font-weight: bold;
    overflow: hidden;
    transition: height 0.1s;
    z-index: 999;
  }
</style>
</head>
<body>

<div id="ptr-indicator"></div>
<header>
  <h1>LOTO7 当選番号分析アプリ</h1>
  <p id="header-desc">データ読み込み中...</p>
  <button class="refresh-btn" onclick="location.reload(true)">🔄 最新データに更新</button>
</header>

<div class="container">
  <!-- 統計カード -->
  <div class="stats-grid" id="stats-grid"></div>

  <!-- 予測セクション -->
  <div class="section">
    <div class="section-title"><span class="icon">🎯</span>次回予測番号</div>
    <div class="prediction-area">
      <p class="prediction-desc" id="pred-desc"></p>
      <div class="mode-toggle">
        <button class="mode-btn active normal" onclick="setPredMode('normal')" id="mode-btn-normal">通常予測</button>
        <button class="mode-btn rare" onclick="setPredMode('rare')" id="mode-btn-rare">💎 激レア狙い予測</button>
      </div>
      <div id="normal-pred-area">
      <div class="method-selector">
        <button class="method-btn active" onclick="setMethod('freq')" id="btn-freq">出現頻度重視</button>
        <button class="method-btn" onclick="setMethod('recent')" id="btn-recent">直近トレンド重視</button>
        <button class="method-btn" onclick="setMethod('balanced')" id="btn-balanced">バランス型</button>
        <button class="method-btn" onclick="setMethod('cold')" id="btn-cold">未出現重視</button>
      </div>
      <div class="prediction-controls">
        <button class="btn btn-primary" onclick="generatePredictions()">予測を更新</button>
        <button class="btn btn-secondary" onclick="generateAll()">全パターン表示</button>
      </div>
      </div>
      <div id="prediction-output" class="prediction-sets"></div>
    </div>
  </div>

  <!-- グラフセクション -->
  <div class="section">
    <div class="section-title"><span class="icon">📊</span>番号別出現頻度グラフ</div>
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="showChart('all')" id="tab-all">全期間</button>
      <button class="chart-tab" onclick="showChart('recent100')" id="tab-recent100">直近100回</button>
      <button class="chart-tab" onclick="showChart('recent300')" id="tab-recent300">直近300回</button>
      <button class="chart-tab" onclick="showChart('bonus')" id="tab-bonus">BONUS番号</button>
    </div>
    <div class="chart-container">
      <canvas id="freqChart"></canvas>
    </div>
  </div>

  <!-- ホット・コールド分析 -->
  <div class="section">
    <div class="section-title"><span class="icon">🔥</span>ホット＆コールド番号分析</div>
    <div class="hotcold-grid">
      <div>
        <div style="color:#00c6ff;font-weight:bold;margin-bottom:12px;">🔥 ホット番号 (よく出る TOP10)</div>
        <ul class="hotcold-list hot" id="hot-list"></ul>
      </div>
      <div>
        <div style="color:#c084fc;font-weight:bold;margin-bottom:12px;">❄️ コールド番号 (出にくい TOP10)</div>
        <ul class="hotcold-list cold" id="cold-list"></ul>
      </div>
    </div>
  </div>

  <!-- 連続出現パターン -->
  <div class="section">
    <div class="section-title"><span class="icon">📈</span>出現パターン分析</div>
    <div id="pattern-stats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;"></div>
  </div>

  <!-- 激レア回分析 -->
  <div class="section">
    <div class="section-title"><span class="icon">💎</span>激レア回分析（1等当選者ゼロの回）</div>
    <div id="rare-analysis"></div>
  </div>

  <!-- 過去当選番号テーブル -->
  <div class="section">
    <div class="section-title"><span class="icon">📋</span>過去当選番号一覧</div>
    <div class="filter-row">
      <label>表示件数：</label>
      <select id="page-size" onchange="changePageSize()">
        <option value="20">20件</option>
        <option value="50">50件</option>
        <option value="100">100件</option>
      </select>
      <label>検索（番号を含む）：</label>
      <select id="filter-num" onchange="filterChange()">
        <option value="">すべて</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>回</th>
            <th>抽選日</th>
            <th>当選番号（7個）</th>
            <th>BONUS</th>
          </tr>
        </thead>
        <tbody id="draw-table"></tbody>
      </table>
    </div>
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)">◀ 前へ</button>
      <span class="page-info" id="page-info"></span>
      <button id="next-btn" onclick="changePage(1)">次へ ▶</button>
    </div>
  </div>
</div>

<div class="footer">
  ロト7 当選番号分析アプリ &nbsp;|&nbsp; データ件数: <span id="footer-count"></span>回 &nbsp;|&nbsp; このアプリは統計的な分析に基づきますが、当選を保証するものではありません
</div>

// ===== 定数 =====
const NUM_MAX = 37;   // ロト7は1〜37
const NUM_PICK = 7;   // 本数字7個
const NUM_BONUS = 2;  // ボーナス数字2個

// ===== 状態 =====
let currentMethod = 'freq';
let currentChartMode = 'all';
let freqChart = null;
let currentPage = 1;
let pageSize = 20;
let filterNum = '';

// ===== 頻度集計 =====
function getFreq(data) {
  const freq = new Array(NUM_MAX + 1).fill(0);
  for (const d of data) {
    for (const n of d.nums) freq[n]++;
  }
  return freq;
}

function getBonusFreq(data) {
  const freq = new Array(NUM_MAX + 1).fill(0);
  for (const d of data) {
    for (const b of d.bonus) freq[b]++;
  }
  return freq;
}

// ===== 統計カード =====
function renderStats() {
  const total = RAW_DATA.length;
  const freq = getFreq(RAW_DATA);
  const hotNum = freq.indexOf(Math.max(...freq.slice(1)));
  const allCounts = freq.slice(1);
  const minVal = Math.min(...allCounts.filter(v => v > 0));
  const coldNum = freq.indexOf(minVal);

  const recent = RAW_DATA.slice(-100);
  const recentFreq = getFreq(recent);
  const recentHot = recentFreq.indexOf(Math.max(...recentFreq.slice(1)));

  const lastDraw = RAW_DATA[RAW_DATA.length - 1];

  const cards = [
    { label: 'データ総数', value: total.toLocaleString() + ' 回', sub: '2013年4月〜現在' },
    { label: '最多出現番号', value: hotNum, sub: freq[hotNum] + ' 回出現' },
    { label: '最少出現番号', value: coldNum, sub: freq[coldNum] + ' 回出現' },
    { label: '直近100回のホット', value: recentHot, sub: recentFreq[recentHot] + ' 回 (直近100回)' },
    { label: '最新抽選', value: lastDraw.date, sub: '第 ' + lastDraw.kai + ' 回' },
    { label: '最新当選番号', value: lastDraw.nums.join('-'), sub: 'BONUS: ' + lastDraw.bonus.join(' / ') },
  ];

  document.getElementById('stats-grid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>
  `).join('');

  document.getElementById('header-desc').textContent =
    `第1回〜第${lastDraw.kai}回 (${lastDraw.date}) の${total}回分のデータを分析`;
  document.getElementById('footer-count').textContent = total.toLocaleString();
}

// ===== ボール色（1〜37対応） =====
function ballColor(n) {
  if (n <= 5)  return '#e74c3c';
  if (n <= 10) return '#e67e22';
  if (n <= 15) return '#f1c40f';
  if (n <= 20) return '#2ecc71';
  if (n <= 25) return '#3498db';
  if (n <= 31) return '#9b59b6';
  return '#1abc9c';
}

function renderBall(n, isBonus=false) {
  const color = isBonus ? '#a855f7' : ballColor(n);
  const textColor = (n >= 13 && n <= 15 && !isBonus) ? '#333' : 'white';
  return `<span class="num-badge ${isBonus ? 'bonus-badge' : ''}" style="background:${isBonus ? 'rgba(168,85,247,0.15)' : color + '33'};color:${isBonus ? '#c084fc' : color};border:2px solid ${isBonus ? '#a855f7' : color};">${n}</span>`;
}

function bigBall(n, isBonus=false) {
  const color = isBonus ? '#a855f7' : ballColor(n);
  const bg = isBonus
    ? 'linear-gradient(135deg,#a855f7,#7c3aed)'
    : `linear-gradient(135deg,${color}cc,${color}66)`;
  const textColor = (n >= 13 && n <= 15 && !isBonus) ? '#222' : 'white';
  return `<div class="ball" style="background:${bg};color:${textColor};box-shadow:0 4px 15px rgba(0,0,0,0.4);">${n}</div>`;
}

// ===== 予測 =====
function setMethod(m) {
  currentMethod = m;
  document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
}

function weightedSample(weights1indexed, n) {
  const avail = weights1indexed.map((w, i) => ({ i: i + 1, w }));
  const picked = [];
  for (let k = 0; k < n; k++) {
    let sum = avail.reduce((a, v) => a + v.w, 0);
    let rand = Math.random() * sum;
    for (const v of avail) {
      rand -= v.w;
      if (rand <= 0 && v.w > 0) {
        picked.push(v.i);
        v.w = 0;
        break;
      }
    }
  }
  return picked.sort((a, b) => a - b);
}

function generateSet(method) {
  const freq = getFreq(RAW_DATA);
  const recentFreq = getFreq(RAW_DATA.slice(-200));
  const weights = new Array(NUM_MAX).fill(0);

  if (method === 'freq') {
    for (let i = 0; i < NUM_MAX; i++) weights[i] = Math.pow(freq[i + 1] + 1, 1.5);
  } else if (method === 'recent') {
    for (let i = 0; i < NUM_MAX; i++) weights[i] = Math.pow(recentFreq[i + 1] + 1, 2);
  } else if (method === 'balanced') {
    for (let i = 0; i < NUM_MAX; i++) weights[i] = freq[i + 1] * 0.5 + recentFreq[i + 1] * 0.8 + 1;
  } else if (method === 'cold') {
    const max = Math.max(...freq.slice(1));
    for (let i = 0; i < NUM_MAX; i++) weights[i] = Math.pow(max - freq[i + 1] + 2, 1.5);
  }

  return weightedSample(weights, NUM_PICK);
}

const methodLabels = {
  'freq':     '出現頻度重視',
  'recent':   '直近トレンド重視',
  'balanced': 'バランス型',
  'cold':     '未出現重視'
};

  'balanced': '全期間と直近のデータをバランスよく組み合わせて7個を選択します。',
  'cold':     '過去に出現が少ない番号を優先し、「そろそろ出るかも」という視点で7個を選択します。'
};

function generatePredictions() {
  document.getElementById('pred-desc').textContent = methodDescs[currentMethod];
  const sets = [generateSet(currentMethod), generateSet(currentMethod), generateSet(currentMethod)];
  const freq = getFreq(RAW_DATA);

      </div>
    </div>
  `).join('');
}

function generateAll() {
  document.getElementById('pred-desc').textContent = '全4パターンの予測方法で各1セットずつ生成しました。';
  const freq = getFreq(RAW_DATA);

  document.getElementById('prediction-output').innerHTML =
    ['freq', 'recent', 'balanced', 'cold'].map(m => {
      const s = generateSet(m);
      return `
        <div class="prediction-set">
          <div class="prediction-set-label">${methodLabels[m]}</div>
          <div class="ball-row">
            ${s.map(n => bigBall(n)).join('')}

          <div style="margin-top:10px;font-size:0.8rem;color:#888;">
            ${s.map(n => `<span style="margin:0 4px;">${n}番: ${freq[n]} 回</span>`).join('')}
          </div>
        </div>
      `;
    }).join('');
}

// ===== グラフ =====
function getChartData(mode) {
  let data, title;
  if (mode === 'all')       { data = getFreq(RAW_DATA);             title = '全期間 出現頻度'; }
  else if (mode === 'recent100') { data = getFreq(RAW_DATA.slice(-100)); title = '直近100回 出現頻度'; }
  else if (mode === 'recent300') { data = getFreq(RAW_DATA.slice(-300)); title = '直近300回 出現頻度'; }
  else                      { data = getBonusFreq(RAW_DATA);         title = 'BONUS番号 出現頻度'; }

  const labels = Array.from({ length: NUM_MAX }, (_, i) => i + 1);
  const values = labels.map(i => data[i]);
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  const colors = values.map(v =>
    v >= avg * 1.15 ? 'rgba(0,198,255,0.8)' :
    v <= avg * 0.85 ? 'rgba(168,85,247,0.8)' :
    'rgba(100,200,180,0.8)'
  );
  return { labels, values, colors, title, avg };
}

function renderChart(mode) {
  const d = getChartData(mode);
  const ctx = document.getElementById('freqChart').getContext('2d');
  if (freqChart) freqChart.destroy();

  freqChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: d.labels,
      datasets: [
        {
          label: d.title,
          data: d.values,
          backgroundColor: d.colors,
          borderColor: d.colors.map(c => c.replace('0.8', '1')),
          borderWidth: 1,
          borderRadius: 4,
        },
        {
          label: '平均出現回数',
          data: d.labels.map(() => d.avg),
          type: 'line',
          borderColor: 'rgba(255,255,255,0.4)',
          borderDash: [5, 5],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#aaa', font: { size: 11 } } },
        tooltip: {
          callbacks: {
            title: items => `番号: ${items[0].label}`,
            label: item => `出現回数: ${item.raw}回`,
          }
        }
      },
      scales: {
        x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
      }
    }
  });
}

function showChart(mode) {
  currentChartMode = mode;
  document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');
  renderChart(mode);
}

// ===== ホット&コールド =====
function renderHotCold() {
  const freq = getFreq(RAW_DATA);
  const pairs = Array.from({ length: NUM_MAX }, (_, i) => ({ n: i + 1, count: freq[i + 1] }));
  pairs.sort((a, b) => b.count - a.count);
  const maxCount = pairs[0].count;

  const coldList = [...pairs].reverse().slice(0, 10);

  document.getElementById('hot-list').innerHTML = pairs.slice(0, 10).map((p, i) => `
    <li>
      <span class="rank">${i + 1}</span>
      <div style="display:flex;align-items:center;gap:8px;width:40px;">${renderBall(p.n)}</div>
      <div class="freq-bar-wrap"><div class="freq-bar hot" style="width:${(p.count / maxCount * 100).toFixed(1)}%"></div></div>
      <span class="freq-count">${p.count}回</span>
    </li>
  `).join('');

  document.getElementById('cold-list').innerHTML = coldList.map((p, i) => `
    <li>
      <span class="rank">${i + 1}</span>
      <div style="display:flex;align-items:center;gap:8px;width:40px;">${renderBall(p.n)}</div>
      <div class="freq-bar-wrap"><div class="freq-bar cold" style="width:${(p.count / maxCount * 100).toFixed(1)}%"></div></div>
      <span class="freq-count">${p.count}回</span>
    </li>
  `).join('');
}

// ===== パターン分析 =====
function renderPatterns() {
  const sums = RAW_DATA.map(d => d.nums.reduce((a, b) => a + b, 0));
  const avgSum = (sums.reduce((a, b) => a + b, 0) / sums.length).toFixed(1);

  const evenCounts = RAW_DATA.map(d => d.nums.filter(n => n % 2 === 0).length);
  const evenDist = [0,1,2,3,4,5,6,7].map(k => evenCounts.filter(c => c === k).length);
  const bestEven = evenDist.indexOf(Math.max(...evenDist));

  let consecutiveCount = 0;
  for (const d of RAW_DATA) {
    const sorted = [...d.nums].sort((a, b) => a - b);
    for (let i = 0; i < sorted.length - 1; i++) {
      if (sorted[i + 1] - sorted[i] === 1) { consecutiveCount++; break; }
    }
  }
  const consecutiveRate = (consecutiveCount / RAW_DATA.length * 100).toFixed(1);

  const sumBuckets = {};
  for (const s of sums) {
    const b = Math.floor(s / 20) * 20;
    sumBuckets[b] = (sumBuckets[b] || 0) + 1;
  }
  const topBucket = Object.entries(sumBuckets).sort((a, b) => b[1] - a[1])[0];

  // ボーナス番号の傾向
  const bonusFreq = getBonusFreq(RAW_DATA);
  const topBonus = bonusFreq.indexOf(Math.max(...bonusFreq.slice(1)));

  document.getElementById('pattern-stats').innerHTML = `
    <div class="stat-card">
      <div class="label">7数字の合計値 平均</div>
      <div class="value">${avgSum}</div>
      <div class="sub">範囲: ${Math.min(...sums)} 〜 ${Math.max(...sums)}</div>
    </div>
    <div class="stat-card">
      <div class="label">最多合計帯</div>
      <div class="value">${topBucket[0]}〜${+topBucket[0] + 19}</div>
      <div class="sub">${topBucket[1]}回 (${(topBucket[1] / RAW_DATA.length * 100).toFixed(1)}%)</div>
    </div>
    <div class="stat-card">
      <div class="label">偶数が最も多い個数</div>
      <div class="value">${bestEven}個</div>
      <div class="sub">${evenDist[bestEven]}回 (${(evenDist[bestEven] / RAW_DATA.length * 100).toFixed(1)}%)</div>
    </div>
    <div class="stat-card">
      <div class="label">連番を含む回の割合</div>
      <div class="value">${consecutiveRate}%</div>
      <div class="sub">全${RAW_DATA.length}回中${consecutiveCount}回</div>
    </div>
    <div class="stat-card">
      <div class="label">最多BONUSボーナス</div>
      <div class="value">${topBonus}番</div>
      <div class="sub">BONUS出現: ${bonusFreq[topBonus]}回</div>
    </div>
  `;
}

// ===== フィルター =====
function buildFilterOptions() {
  const sel = document.getElementById('filter-num');
  for (let i = 1; i <= NUM_MAX; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i + '番';
    sel.appendChild(opt);
  }
}

function filterChange() {
  filterNum = document.getElementById('filter-num').value;
  currentPage = 1;
  renderTable();
}

function changePageSize() {
  pageSize = parseInt(document.getElementById('page-size').value);
  currentPage = 1;
  renderTable();
}

function changePage(dir) {
  currentPage += dir;
  renderTable();
}

// ===== テーブル =====
function renderTable() {
  const data = filterNum
    ? RAW_DATA.filter(d => d.nums.includes(+filterNum) || d.bonus.includes(+filterNum))
    : RAW_DATA;

  const sorted = [...data].reverse();
  const totalPages = Math.ceil(sorted.length / pageSize);
  currentPage = Math.max(1, Math.min(currentPage, totalPages));
  const pageData = sorted.slice((currentPage - 1) * pageSize, currentPage * pageSize);

  const freq = getFreq(RAW_DATA);
  const avg = RAW_DATA.length * NUM_PICK / NUM_MAX;

  document.getElementById('draw-table').innerHTML = pageData.map(d => `
    <tr>
      <td class="kai-col">第${d.kai}回</td>
      <td class="date-col">${d.date}</td>
      <td>
        ${d.nums.map(n => {
          const isHot  = freq[n] >= avg * 1.1;
          const isCold = freq[n] <= avg * 0.9;
          return renderBall(n) + (isHot ? '<span class="tag tag-hot">熱</span>' : isCold ? '<span class="tag tag-cold">冷</span>' : '');
        }).join('')}
      </td>
      <td>
        ${d.bonus.map(b => renderBall(b, true)).join(' ')}
      </td>
    </tr>
  `).join('');

  document.getElementById('page-info').textContent =
    `${currentPage} / ${totalPages} ページ（${sorted.length}件）`;
  document.getElementById('prev-btn').disabled = currentPage <= 1;
  document.getElementById('next-btn').disabled = currentPage >= totalPages;
}

// ===== 激レア回分析 =====
let currentPredMode = 'normal';

function setPredMode(mode) {
  currentPredMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-btn-' + mode).classList.add('active');
  document.getElementById('normal-pred-area').style.display = mode === 'normal' ? '' : 'none';
  if (mode === 'normal') { generateAll(); } else { generateRarePredictions(); }
}

function getRareRounds() { return RAW_DATA.filter(d => d.win1 === 0); }

function generateRareSet() {
  const rare = getRareRounds();
  if (rare.length === 0) return [];
  const rareFreq = getFreq(rare);
  const allFreq = getFreq(RAW_DATA);
  const weights = new Array(NUM_MAX).fill(1);
  for (let i = 0; i < NUM_MAX; i++) {
    const rr = (rareFreq[i + 1] + 0.5) / rare.length;
    const ar = (allFreq[i + 1] + 0.5) / RAW_DATA.length;
    weights[i] = Math.pow(rr / ar, 1.5) * (rareFreq[i + 1] + 1);
  }
  return weightedSample(weights, NUM_PICK);
}

function generateRarePredictions() {
  const rare = getRareRounds();
  document.getElementById('pred-desc').textContent =
    `1等当選者ゼロの回（計${rare.length}回）に出やすかった番号の傾向をもとに予測します。`;
  const rareFreq = getFreq(rare);
  const sets = [generateRareSet(), generateRareSet(), generateRareSet()];
  document.getElementById('prediction-output').innerHTML = sets.map((s, idx) => `
    <div class="prediction-set">
      <div class="prediction-set-label">💎 激レア狙い予測 セット${idx + 1}</div>
      <div class="ball-row">${s.map(n => bigBall(n)).join('')}</div>
      <div style="margin-top:10px;font-size:0.8rem;color:#888;">
        ${s.map(n => `<span style="margin:0 4px;">${n}番: 激レア回 ${rareFreq[n]} 回出現</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function renderRare() {
  const rare = getRareRounds();
  const rareFreq = getFreq(rare);
  const allFreq = getFreq(RAW_DATA);
  const ratio = Array.from({length: NUM_MAX + 1}, (_, i) => {
    if (i === 0) return 0;
    return ((rareFreq[i] + 0.5) / rare.length) / ((allFreq[i] + 0.5) / RAW_DATA.length);
  });
  const ranked = Array.from({length: NUM_MAX}, (_, i) => ({n: i+1, ratio: ratio[i+1], rareCount: rareFreq[i+1]}));
  ranked.sort((a, b) => b.ratio - a.ratio);
  const top10 = ranked.slice(0, 10);
  const bottom10 = [...ranked].sort((a, b) => a.ratio - b.ratio).slice(0, 10);
  const maxRatio = top10[0].ratio;
  const lastRare = rare.length > 0 ? rare[rare.length - 1] : null;
  document.getElementById('rare-analysis').innerHTML = `
    <div style="margin-bottom:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
      <div class="stat-card">
        <div class="label">激レア回数（1等0口）</div>
        <div class="value">${rare.length}回</div>
        <div class="sub">全${RAW_DATA.length}回中 (${(rare.length / RAW_DATA.length * 100).toFixed(1)}%)</div>
      </div>
      <div class="stat-card">
        <div class="label">最新激レア回</div>
        <div class="value" style="font-size:1.2rem;">${lastRare ? lastRare.date : '-'}</div>
        <div class="sub">${lastRare ? '第' + lastRare.kai + '回' : '-'}</div>
      </div>
    </div>
    <div class="hotcold-grid">
      <div>
        <div style="color:#ff8c42;font-weight:bold;margin-bottom:12px;">💎 激レア回で出やすい番号 TOP10</div>
        <ul class="hotcold-list hot">
          ${top10.map((p, i) => `<li>
            <span class="rank">${i+1}</span>
            <div style="display:flex;align-items:center;gap:8px;width:40px;">${renderBall(p.n)}</div>
            <div class="freq-bar-wrap"><div class="freq-bar hot" style="width:${(p.ratio/maxRatio*100).toFixed(1)}%"></div></div>
            <span class="freq-count">${p.rareCount}回</span>
            <span class="rare-badge">×${p.ratio.toFixed(2)}</span>
          </li>`).join('')}
        </ul>
      </div>
      <div>
        <div style="color:#a78bfa;font-weight:bold;margin-bottom:12px;">❄️ 激レア回で出にくい番号 TOP10</div>
        <ul class="hotcold-list cold">
          ${bottom10.map((p, i) => `<li>
            <span class="rank">${i+1}</span>
            <div style="display:flex;align-items:center;gap:8px;width:40px;">${renderBall(p.n)}</div>
            <div class="freq-bar-wrap"><div class="freq-bar cold" style="width:${(p.ratio/maxRatio*100).toFixed(1)}%"></div></div>
            <span class="freq-count">${p.rareCount}回</span>
            <span class="rare-badge">×${p.ratio.toFixed(2)}</span>
          </li>`).join('')}
        </ul>
      </div>
    </div>
  `;
}

// ===== 起動 =====
window.addEventListener('load', () => {
  renderStats();
  generateAll();
  renderChart('all');
  renderHotCold();
  renderPatterns();
  buildFilterOptions();
  renderTable();
  renderRare();
});
// ===== プルダウンリフレッシュ =====
(function() {
  let startY = 0, pulling = false;
  const THRESHOLD = 70;
  const ind = document.getElementById('ptr-indicator');

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = Math.min(e.touches[0].clientY - startY, THRESHOLD * 1.5);
    if (dy > 0) {
      ind.style.height = Math.min(dy, THRESHOLD) + 'px';
      ind.textContent = dy >= THRESHOLD ? '🔄 離して更新' : '↓ 引っ張って更新';
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const h = parseFloat(ind.style.height || '0');
    ind.style.height = '0';
    if (h >= THRESHOLD) { setTimeout(() => location.reload(true), 150); }
  });
})();

</script>
